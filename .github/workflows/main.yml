name: Kernel Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v4

    - name: Set up MemKernel as a module
      run: |
        git config --global --add safe.directory $GITHUB_WORKSPACE
        curl -fLSs "https://githubusercontent.com" | bash -s M dogi

    - name: Android kernel build
      uses: lemniskett/android-kernel-actions@master
      id: build
      env:
        NAME: Loganysl
      with:
        arch: arm64
        # FIXED: Replaced "android12-5.10" branch layout with standard "master" target mirror path
        compiler: aosp-clang/master/clang-r416183b/binutils
        defconfig: gki_defconfig
        image: Image.gz-dtb

    - name: Upload Kernel and Module
      uses: actions/upload-artifact@v4
      with:
        name: module
        path: |
          ${{ steps.build.outputs.outfile }}
          ./out/drivers/memkernel/memkernel.ko

