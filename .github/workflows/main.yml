name: Kernel Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v4

    - name: Set up MemKernel as a module
      run: |
        # Updated to your functional setup link with correct device parameter 'dogi'
        curl -LSs "https://raw.githubusercontent.com/aiichi/MemKernel/main/kernel/setup.sh" | bash -s M dogi

    - name: Android kernel build
      uses: lemniskett/android-kernel-actions@master
      id: build
      env:
        NAME: Loganysl
      with:
        # Changed to arm64 since you are building for modern aarch64 GKI GSI targets
        arch: arm64
        # Updated to a stable, compatible Clang version containing the necessary gas links
        compiler: clang-r418251b
        # Replaced the placeholder with your target defconfig name
        defconfig: gki_defconfig
        # Replaced with your target build output target
        image: Image.gz-dtb

    - name: Upload Kernel and Module
      uses: actions/upload-artifact@v4
      with:
        name: module
        path: |
          ${{ steps.build.outputs.outfile }}
          ./out/drivers/memkernel/memkernel.ko
