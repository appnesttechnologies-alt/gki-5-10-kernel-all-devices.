name: Kernel Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v4

    - name: Fix git ownership
      run: git config --global --add safe.directory /github/workspace

    - name: Build Kernel
      shell: bash
      run: |
        # 1. Dependencies
        sudo apt-get update
        sudo apt-get install -y bc bison flex libelf-dev libssl-dev clang lld llvm curl git make
        
        # 2. Sahi MemKernel setup link
        curl -LSs "https://raw.githubusercontent.com/Poko-Apps/MemKernel/main/kernel/setup.sh" | bash -s M myname
        
        # 3. Environment variables
        export ARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CC=clang
        
        # 4. Build
        mkdir -p out
        make O=out gki_defconfig
        # Fragment merge (path check kar lena, agar root mein hai toh sahi hai)
        ./scripts/kconfig/merge_config.sh -O out out/.config garnet_optimized.fragment
        make O=out -j$(nproc) Image.gz-dtb

    - name: Upload Kernel
      uses: actions/upload-artifact@v4
      with:
        name: module
        path: |
          out/arch/arm64/boot/Image.gz-dtb
          out/drivers/memkernel/memkernel.ko
