name: Kernel Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v4

    - name: Fix git ownership
      run: git config --global --add safe.directory /github/workspace

    - name: Set up MemKernel as a module (M-OUT) with specified name
      shell: bash
      run: |
        curl -LSs "https://raw.githubusercontent.com/aiichi/MemKernel/main/kernel/setup.sh" | bash -s M dogi

    - name: Android kernel build
      uses: lemniskett/android-kernel-actions@master
      id: build
      env:
        NAME: Loganysl
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      with:
        arch: arm64
        # 'clang-16' ke jagah 'clang' try kar, kyunki ye action aksar generic name leta hai
        compiler: clang 
        defconfig: gki_defconfig garnet_optimized.fragment
        image: Image.gz-dtb

    - name: Upload Kernel and Module
      uses: actions/upload-artifact@v4
      with:
        name: module
        path: |
          ${{ steps.build.outputs.outfile }}
          ./out/drivers/memkernel/memkernel.ko
