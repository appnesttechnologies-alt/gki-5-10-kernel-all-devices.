name: Kernel Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v4

    - name: Fix git ownership
      run: git config --global --add safe.directory /github/workspace

    - name: Set up MemKernel as a module (M-OUT) with specified name
      shell: bash
      run: |
        curl -LSs "https://raw.githubusercontent.com/aiichi/MemKernel/main/kernel/setup.sh" | bash -s M dogi

    - name: Build Kernel Manually
      shell: bash
      env:
        NAME: Loganysl
      run: |
        # Dependencies install karna
        sudo apt-get update
        sudo apt-get install -y bc bison flex libelf-dev libssl-dev clang
        
        # Build process
        export ARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CC=clang
        
        echo "Building kernel..."
        make defconfig gki_defconfig garnet_optimized.fragment
        make -j$(nproc) Image.gz-dtb

    - name: Upload Kernel and Module
      uses: actions/upload-artifact@v4
      with:
        name: module
        path: |
          ./arch/arm64/boot/Image.gz-dtb
          ./out/drivers/memkernel/memkernel.ko
