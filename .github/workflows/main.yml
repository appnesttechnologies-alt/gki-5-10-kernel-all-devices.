name: Kernel Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v4

    - name: Fix git ownership
      run: git config --global --add safe.directory /github/workspace

    - name: Manual Build Process
      shell: bash
      run: |
        # Dependencies install karo
        sudo apt-get update
        sudo apt-get install -y bc bison flex libelf-dev libssl-dev clang lld llvm curl git make
        
        # MemKernel setup
        curl -LSs "https://raw.githubusercontent.com/aiichi/MemKernel/main/kernel/setup.sh" | bash -s M dogi
        
        # Environment
        export ARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CC=clang
        
        # Build
        mkdir -p out
        make O=out gki_defconfig
        ./scripts/kconfig/merge_config.sh -O out out/.config garnet_optimized.fragment
        make O=out -j$(nproc) Image.gz-dtb

    - name: Upload Kernel
      uses: actions/upload-artifact@v4
      with:
        name: module
        path: |
          out/arch/arm64/boot/Image.gz-dtb
          out/drivers/memkernel/memkernel.ko
