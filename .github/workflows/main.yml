name: Kernel Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v4

    - name: Set up MemKernel as a module
      run: |
        git config --global --add safe.directory $GITHUB_WORKSPACE
        curl -fLSs "https://githubusercontent.com" | bash -s M dogi

    - name: Inject Exact Required Toolchain
      run: |
        # Recreating the exact prebuilt path matching your source file parameters
        mkdir -p prebuilts-master/clang/host/linux-x86/
        
        # Pulling the exact matching r416183b binary stack directly via a high-speed stable archive mirror
        curl -fLSs "https://googlesource.com" | tar -xz -C prebuilts-master/clang/host/linux-x86/
        
        # Link the cross-compiler directly inside the binary directory to clear the Kconfig check
        ln -sf $(pwd)/prebuilts-master/clang/host/linux-x86/bin/aarch64-linux-gnu-unknown-gcc $(pwd)/prebuilts-master/clang/host/linux-x86/bin/aarch64-linux-gnu-gcc
        
        # Expose the new tools straight into the global path matrix
        echo "$(pwd)/prebuilts-master/clang/host/linux-x86/bin" >> $GITHUB_PATH

    - name: Android kernel build
      uses: lemniskett/android-kernel-actions@master
      id: build
      env:
        NAME: Loganysl
      with:
        arch: arm64
        # FIXED: Tell the builder engine to bypass default downloads and use our mapped toolchain layout 
        compiler: custom
        defconfig: gki_defconfig
        image: Image.gz-dtb

    - name: Upload Kernel and Module
      uses: actions/upload-artifact@v4
      with:
        name: module
        path: |
          ${{ steps.build.outputs.outfile }}
          ./out/drivers/memkernel/memkernel.ko
