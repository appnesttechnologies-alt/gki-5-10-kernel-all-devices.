name: Kernel Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v4

    - name: Set up MemKernel as a module
      run: |
        git config --global --add safe.directory $GITHUB_WORKSPACE
        curl -fLSs "https://githubusercontent.com" | bash -s M dogi

    - name: Pre-download Exact Clang Toolchain
      run: |
        # Build out the exact directory paths expected by your config trees
        mkdir -p prebuilts-master/clang/host/linux-x86/
        
        # Download the specific compiler bundle from the validated Google index mirror
        curl -fLSs "https://googlesource.com" | tar -xz -C prebuilts-master/clang/host/linux-x86/
        
        # Create the fallback standard symlinks to satisfy Kconfig checks
        ln -sf $(pwd)/prebuilts-master/clang/host/linux-x86/bin/aarch64-linux-gnu-unknown-gcc $(pwd)/prebuilts-master/clang/host/linux-x86/bin/aarch64-linux-gnu-gcc
        
        # Expose bin files globally to the virtual environment
        echo "$(pwd)/prebuilts-master/clang/host/linux-x86/bin" >> $GITHUB_PATH

    - name: Android kernel build
      # CHANGED: Switched to the modern builder engine which allows custom toolchain variables
      uses: mvaisakh/android-kernel-actions@main
      id: build
      env:
        NAME: Loganysl
      with:
        arch: arm64
        # Setting this to custom bypasses server downloads completely 
        compiler: custom
        defconfig: gki_defconfig
        image: Image.gz-dtb

    - name: Upload Kernel and Module
      uses: actions/upload-artifact@v4
      with:
        name: module
        path: |
          ${{ steps.build.outputs.outfile }}
          ./out/drivers/memkernel/memkernel.ko
