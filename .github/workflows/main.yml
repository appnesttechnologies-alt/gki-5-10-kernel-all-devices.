name: Kernel Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4

      - name: Set up MemKernel as a module
        run: |
          # Bash -s M dogi wale approach se setup chalate hain
          curl -LSs "https://raw.githubusercontent.com/aiichi/MemKernel/main/kernel/setup.sh" | bash -s M dogi

      - name: Android kernel build
        uses: lemniskett/android-kernel-actions@master
        id: build
        with:
          arch: arm64
          compiler: clang-15 # Ya tumhara jo bhi version hai
          defconfig: gki_defconfig # Yahan apni defconfig file ka naam dalo
          image: Image.gz-dtb

      - name: Upload Kernel and Module
        uses: actions/upload-artifact@v4
        with:
          name: kernel-and-module
          path: |
            ${{ steps.build.outputs.outfile }}
            ./out/drivers/memkernel/memkernel.ko
            
