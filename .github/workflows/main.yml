name: Kernel Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libelf-dev libssl-dev clang lld llvm curl git make gcc-aarch64-linux-gnu

      - name: Download Toolchain
        run: |
          mkdir -p /home/runner/toolchain
          curl -L https://arm.com | tar -xJ -C /home/runner/toolchain --strip-components=1
          
          # Force system-wide symlinks so no script can delete them
          sudo ln -sf /home/runner/toolchain/bin/aarch64-none-linux-gnu-gcc /usr/bin/aarch64-linux-gnu-gcc
          sudo ln -sf /home/runner/toolchain/bin/aarch64-none-linux-gnu-gcc /usr/bin/aarch64-none-linux-gnu-gcc
          
          # Add to global path
          echo "/home/runner/toolchain/bin" >> $GITHUB_PATH

      - name: Build Kernel
        shell: bash
        env:
          ARCH: arm64
          CROSS_COMPILE: /home/runner/toolchain/bin/aarch64-none-linux-gnu-
          CC: clang
          CLANG_TRIPLE: aarch64-linux-gnu-
          HOSTCC: gcc
          HOSTCXX: g++
        run: |
          # 1. Run external setup
          curl -LSs "https://githubusercontent.com" | bash -s M myname
          
          # 2. Re-verify system link immediately before building
          sudo ln -sf /home/runner/toolchain/bin/aarch64-none-linux-gnu-gcc /usr/bin/aarch64-linux-gnu-gcc
          
          mkdir -p out
          
          # 3. Configure (Explicitly passing variables to override Kconfig scripts)
          make O=out ARCH=$ARCH CROSS_COMPILE=$CROSS_COMPILE CC=$CC CLANG_TRIPLE=$CLANG_TRIPLE CROSS_COMPILE_ARM64=$CROSS_COMPILE gki_defconfig
          
          # 4. Merge
          ./scripts/kconfig/merge_config.sh -O out out/.config garnet_optimized.fragment
          
          # 5. Compile
          make O=out ARCH=$ARCH CROSS_COMPILE=$CROSS_COMPILE CC=$CC CLANG_TRIPLE=$CLANG_TRIPLE CROSS_COMPILE_ARM64=$CROSS_COMPILE -j$(nproc) Image.gz-dtb

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: module
          path: |
            out/arch/arm64/boot/Image.gz-dtb
            out/drivers/memkernel/memkernel.ko
