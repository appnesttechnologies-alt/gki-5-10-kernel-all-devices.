name: Kernel Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v4

    - name: Set up MemKernel as a module
      run: |
        git config --global --add safe.directory $GITHUB_WORKSPACE
        curl -fLSs "https://githubusercontent.com" | bash -s M dogi

    - name: Pre-download Exact Clang Toolchain
      run: |
        # Build out the accurate directory paths expected by your config trees
        mkdir -p prebuilts-master/clang/host/linux-x86/
        
        # Download compiler bundle from the validated Google kernel build matrix branch
        curl -fLSs "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/master-kernel-build-2021/clang-r416183b.tar.gz" | tar -xz -C prebuilts-master/clang/host/linux-x86/
        
        # Resolve internal system cross-compilation reference checks natively
        ln -sf $(pwd)/prebuilts-master/clang/host/linux-x86/bin/aarch64-linux-gnu-unknown-gcc $(pwd)/prebuilts-master/clang/host/linux-x86/bin/aarch64-linux-gnu-gcc
        
        # Expose bin files globally to any sub-shell or engine running in the container
        echo "$(pwd)/prebuilts-master/clang/host/linux-x86/bin" >> $GITHUB_PATH

    - name: Android kernel build
      uses: lemniskett/android-kernel-actions@master
      id: build
      env:
        NAME: Loganysl
      with:
        arch: arm64
        # Telling the action script engine to skip network calls and use our active toolchain directory
        compiler: custom
        defconfig: gki_defconfig
        image: Image.gz-dtb

    - name: Upload Kernel and Module
      uses: actions/upload-artifact@v4
      with:
        name: module
        path: |
          ${{ steps.build.outputs.outfile }}
          ./out/drivers/memkernel/memkernel.ko
