name: Kernel Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4

      - name: Set up MemKernel as a module
        run: |
          curl -LSs "https://raw.githubusercontent.com/Poko-Apps/MemKernel/main/kernel/setup.sh" -o setup.sh
          bash setup.sh M

      - name: Android kernel build
        uses: lemniskett/android-kernel-actions@master
        id: build
        with:
          arch: arm64
          compiler: clang-15
          defconfig: gki_defconfig
          image: Image.gz-dtb

      - name: Upload Kernel and Module
        uses: actions/upload-artifact@v4
        with:
          name: kernel-and-module
          path: |
            ${{ steps.build.outputs.outfile }}
            ./out/drivers/memkernel/memkernel.ko
